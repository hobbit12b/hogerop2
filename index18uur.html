<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Raket vuur test</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #06111f;
    font-family: Arial, sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at 50% 35%, #18375e 0%, #071322 58%, #03070d 100%);
    touch-action: none;
  }
  .panel {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 12px;
    z-index: 5;
    background: rgba(255,255,255,0.94);
    border-radius: 18px;
    padding: 12px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    color: #1d2935;
  }
  .panel h1 {
    margin: 0 0 8px;
    font-size: 17px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px 12px;
  }
  label {
    display: grid;
    gap: 3px;
    font-size: 13px;
    font-weight: 700;
  }
  .row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  input[type="range"] { width: 100%; }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 9px 12px;
    background: #e8edf4;
    font-weight: 800;
    color: #1d2935;
  }
  .values {
    margin-top: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
    background: #f5f7fa;
    border-radius: 10px;
    padding: 8px;
    overflow: auto;
    white-space: nowrap;
  }
  @media (orientation: landscape) {
    .panel {
      left: auto;
      width: 420px;
      top: 12px;
      bottom: auto;
    }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="panel">
  <h1>Raket met verstelbaar vuur</h1>
  <div class="grid" id="controls"></div>
  <div class="buttons">
    <button id="reset">Reset</button>
    <button id="toggleGuide">Hulplijnen aan</button>
    <button id="copy">Kopieer waarden</button>
  </div>
  <div class="values" id="values"></div>
</div>
<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const controlsEl = document.getElementById('controls');
  const valuesEl = document.getElementById('values');

  const img = new Image();
  img.src = 'assets/raket.png';

  const defaults = {
    rocketSize: 180,
    flameX: 0,
    flameY: 92,
    flameAngle: 90,
    flameLength: 78,
    flameWidth: 36,
    smokeX: 0,
    smokeY: 126,
    speed: 6.2
  };

  const config = { ...defaults };
  let showGuide = false;
  let lastTs = 0;
  let time = 0;

  const sliders = [
    ['rocketSize', 'Raket grootte', 80, 260, 1],
    ['flameX', 'Vuur X', -160, 160, 1],
    ['flameY', 'Vuur Y', -160, 180, 1],
    ['flameAngle', 'Vuur hoek', -180, 180, 1],
    ['flameLength', 'Vuur lengte', 10, 180, 1],
    ['flameWidth', 'Vuur breedte', 4, 100, 1],
    ['smokeX', 'Rook X', -160, 160, 1],
    ['smokeY', 'Rook Y', -160, 220, 1],
    ['speed', 'Snelheid', 2, 12, 0.1]
  ];

  function makeSlider([key, label, min, max, step]) {
    const wrap = document.createElement('label');
    const row = document.createElement('div');
    row.className = 'row';
    const name = document.createElement('span');
    const value = document.createElement('span');
    name.textContent = label;
    value.textContent = config[key];
    row.append(name, value);

    const input = document.createElement('input');
    input.type = 'range';
    input.min = min;
    input.max = max;
    input.step = step;
    input.value = config[key];
    input.addEventListener('input', () => {
      config[key] = Number(input.value);
      value.textContent = input.value;
      updateValues();
    });

    wrap.append(row, input);
    controlsEl.appendChild(wrap);
    return { key, input, value };
  }

  const sliderRefs = sliders.map(makeSlider);

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(innerWidth * dpr);
    canvas.height = Math.round(innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
  }

  function drawStars() {
    ctx.save();
    for (let i = 0; i < 46; i++) {
      const x = ((i * 173) % 1000) / 1000 * innerWidth;
      const y = ((i * 311) % 1000) / 1000 * innerHeight;
      const tw = 0.35 + Math.sin(time * 2 + i) * 0.25;
      ctx.globalAlpha = 0.28 + tw * 0.4;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y, 1.2 + (i % 3) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFlameAndSmoke(flicker) {
    const angle = config.flameAngle * Math.PI / 180;
    const len = config.flameLength * (0.88 + Math.sin(flicker * 18) * 0.08 + Math.sin(flicker * 31) * 0.05);
    const width = config.flameWidth;

    ctx.save();
    ctx.translate(config.smokeX, config.smokeY);
    ctx.rotate(angle);
    for (let i = 0; i < 5; i++) {
      const t = (flicker * 0.85 + i / 5) % 1;
      const px = -len * (0.25 + t * 1.1);
      const py = Math.sin(flicker * 8 + i * 1.7) * width * 0.18;
      ctx.globalAlpha = 0.24 * (1 - t);
      ctx.fillStyle = '#dbe2ea';
      ctx.beginPath();
      ctx.ellipse(px, py, width * (0.18 + t * 0.20), width * (0.14 + t * 0.18), 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.translate(config.flameX, config.flameY);
    ctx.rotate(angle);

    const outer = ctx.createLinearGradient(-len, 0, 8, 0);
    outer.addColorStop(0, 'rgba(255, 80, 0, 0)');
    outer.addColorStop(0.25, 'rgba(255, 100, 0, 0.45)');
    outer.addColorStop(0.60, 'rgba(255, 172, 24, 0.86)');
    outer.addColorStop(1, 'rgba(255, 235, 160, 0.18)');
    ctx.fillStyle = outer;
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.quadraticCurveTo(-len * 0.35, -width, -len, 0);
    ctx.quadraticCurveTo(-len * 0.35, width, 8, 0);
    ctx.closePath();
    ctx.fill();

    const innerLen = len * 0.56;
    const inner = ctx.createLinearGradient(-innerLen, 0, 6, 0);
    inner.addColorStop(0, 'rgba(255, 150, 0, 0)');
    inner.addColorStop(0.45, 'rgba(255, 235, 100, 0.95)');
    inner.addColorStop(1, 'rgba(255, 255, 235, 0.6)');
    ctx.fillStyle = inner;
    ctx.beginPath();
    ctx.moveTo(6, 0);
    ctx.quadraticCurveTo(-innerLen * 0.35, -width * 0.45, -innerLen, 0);
    ctx.quadraticCurveTo(-innerLen * 0.35, width * 0.45, 6, 0);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawGuide() {
    if (!showGuide) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-180, 0);
    ctx.lineTo(180, 0);
    ctx.moveTo(0, -180);
    ctx.lineTo(0, 210);
    ctx.stroke();

    ctx.fillStyle = '#5ff';
    ctx.beginPath();
    ctx.arc(config.flameX, config.flameY, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = '12px Arial';
    ctx.fillText('vuurpunt', config.flameX + 8, config.flameY - 8);
    ctx.fillText('motorgebied', -33, 84);
    ctx.strokeStyle = 'rgba(255,255,0,0.85)';
    ctx.strokeRect(-36, 72, 72, 42);
    ctx.restore();
  }

  function drawRocketGroup(x, y, rotation) {
    if (!img.complete || !img.width) return;

    const scale = config.rocketSize / Math.max(img.width, img.height);
    const w = img.width * scale;
    const h = img.height * scale;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);

    drawFlameAndSmoke(time);
    drawGuide();
    ctx.drawImage(img, -w / 2, -h / 2, w, h);

    ctx.restore();
  }

  function updateValues() {
    valuesEl.textContent = JSON.stringify(config);
  }

  function reset() {
    Object.assign(config, defaults);
    sliderRefs.forEach(({ key, input, value }) => {
      input.value = config[key];
      value.textContent = config[key];
    });
    updateValues();
  }

  document.getElementById('reset').addEventListener('click', reset);
  document.getElementById('toggleGuide').addEventListener('click', (e) => {
    showGuide = !showGuide;
    e.currentTarget.textContent = showGuide ? 'Hulplijnen uit' : 'Hulplijnen aan';
  });
  document.getElementById('copy').addEventListener('click', async () => {
    const text = JSON.stringify(config, null, 2);
    try {
      await navigator.clipboard.writeText(text);
      valuesEl.textContent = 'Gekopieerd: ' + JSON.stringify(config);
    } catch {
      valuesEl.textContent = text;
    }
  });

  function loop(ts) {
    const dt = lastTs ? (ts - lastTs) / 1000 : 0;
    lastTs = ts;
    time += dt;

    ctx.clearRect(0, 0, innerWidth, innerHeight);
    drawStars();

    const cycle = config.speed;
    const p = ((time / cycle) % 1);
    const x = -config.rocketSize + p * (innerWidth + config.rocketSize * 2);
    const y = innerHeight * 0.44 + Math.sin(p * Math.PI * 2) * innerHeight * 0.10;

    const dx = innerWidth + config.rocketSize * 2;
    const dy = Math.cos(p * Math.PI * 2) * Math.PI * 2 * innerHeight * 0.10;
    const flightAngle = Math.atan2(dy, dx);

    drawRocketGroup(x, y, flightAngle + Math.PI / 2);
    requestAnimationFrame(loop);
  }

  addEventListener('resize', resize);
  resize();
  updateValues();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
