<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raket zichtbaar test</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #87ceeb, #dff6ff);
      font-family: Arial, sans-serif;
    }

    #gameArea {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #rocket {
      position: absolute;
      left: 50px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 100px;
      z-index: 9999;
      user-select: none;
    }

    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.85);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="gameArea">
    <div id="rocket">🚀</div>
    <div id="info">
      Als je deze raket ziet, werkt de rendering correct.
    </div>
  </div>

  <script>
    window.onload = () => {
      const rocket = document.getElementById('rocket');
      console.log('Raket geladen:', rocket);
    };
  </script>
</body>
</html>
